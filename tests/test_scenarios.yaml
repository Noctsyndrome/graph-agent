baseline:
  - id: S1-1
    question: 冷水机组有哪些型号？
    must_include: [型号, 品牌]
  - id: S1-2
    question: 能效比在6以上的冷水机组有哪些？
    must_include: [能效比, 型号]
  - id: S1-3
    question: 开利 30XA-300 的详细参数是什么？
    must_include: [30XA-300, 开利, 制冷剂]
  - id: S1-4
    question: 开利和约克的冷水机组有什么区别？
    must_include: [开利, 约克]
  - id: S2-1
    question: 万科的项目分别用了哪些品牌的冷水机组？
    must_include: [万科, 项目]
  - id: S2-2
    question: 哪些项目安装了开利的设备？
    must_include: [项目, 城市]
  - id: S2-3
    question: 深圳区域的项目都用了什么设备？
    must_include: [深圳, 项目]
  - id: S3-1
    question: 哪个客户使用开利设备最多？
    must_include: [客户, 使用数量]
  - id: S3-2
    question: 各品牌设备在所有项目中的占比是多少？
    must_include: [品牌, 占比]
  - id: S3-3
    question: 哪个城市的项目设备总制冷量最大？
    must_include: [城市, 总制冷量]
  - id: S4-1
    question: 2023年后的项目中，有没有还在用R-22制冷剂设备的？
    must_include: [R-22, 项目]
  - id: S4-2
    question: 万科的商业项目中，能效比最低的设备是哪台？有没有可替代方案？
    must_include: [型号, 品牌]
  - id: S4-3
    question: 对比深圳和上海的项目，哪边的设备平均能效比更高？
    must_include: [深圳, 上海]

challenge:
  - id: C1
    question: 帮我列一下冷水机组的设备型号
    must_include: [型号, 品牌]
  - id: C2
    question: 冷水机组里哪些型号 COP 超过 6？
    must_include: [能效比, 型号]
  - id: C3
    question: 30XA-300 的参数给我看下
    must_include: [30XA-300, 制冷剂]
  - id: C4
    question: 比较一下开利和约克冷水机组的差异
    must_include: [开利, 约克]
  - id: C5
    question: 万科名下各项目都在用哪些冷水机品牌？
    must_include: [万科, 项目]
  - id: C6
    question: 开利设备都落在哪些项目上？
    must_include: [项目]
  - id: C7
    question: 深圳项目装了哪些设备型号？
    must_include: [项目]
  - id: C8
    question: 开利设备用量最多的是哪个客户？
    must_include: [客户]
  - id: C9
    question: 全部项目里，各品牌设备分别占多少比例？
    must_include: [品牌, 占比]
  - id: C10
    question: 哪座城市的项目总制冷量排第一？
    must_include: [城市, 总制冷量]
  - id: C11
    question: 2024 年以后还有项目在用 R-22 吗？
    must_include: [R-22, 项目]
  - id: C12
    question: 万科商业项目里最差 COP 的设备是什么，有替代型号吗？
    must_include: [型号, 品牌]
  - id: C13
    question: 深圳和上海的项目相比，哪边平均能效更高？
    must_include: [深圳, 上海]
  - id: C14
    question: 深圳的项目使用了哪些品牌？
    must_include: [项目]
  - id: C15
    question: 哪个客户的开利设备数量最多？
    must_include: [客户]
  - id: C16
    question: 万科商业项目里 COP 最低的是哪台设备？
    must_include: [型号]
  - id: C17
    question: 有没有品牌 XYZ 的设备？
    allow_empty: true
  - id: C18
    question: 火星区域的项目用了什么设备？
    allow_empty: true
  - id: C19
    question: 给我按项目看深圳区域当前都在用什么品牌和型号
    must_include: [项目]
  - id: C20
    question: 冷水机组中开利和约克谁的平均能效比更高？
    must_include: [开利, 约克]

generalization:
  # A 类：同域换角度（规则无对应模板）
  - id: G1
    question: 噪音低于 70 分贝的冷水机组有哪些？
    must_include: [型号, 噪音]
  - id: G2
    question: 价格在 80 万以上的设备型号有哪些？
    must_include: [型号, 价格]
  - id: G3
    question: 格力有几个型号的冷水机组？
    must_include: [格力]
  - id: G4
    question: 使用 R-410A 制冷剂的设备有哪些？
    must_include: [型号, R-410A]
  - id: G5
    question: 重量最轻的冷水机组是哪个型号？
    must_include: [型号, 重量]
  # B 类：跨域新路径
  - id: G6
    question: 哪些项目同时安装了开利和约克的设备？
    must_include: [项目]
  - id: G7
    question: 华润的项目分布在哪些城市？
    must_include: [华润, 城市]
  - id: G8
    question: 安装数量超过 5 台的项目有哪些？
    must_include: [项目]
  - id: G9
    question: 哪些客户的项目用了大金的设备？
    must_include: [客户]
  - id: G10
    question: 苏州有哪些客户有项目？
    must_include: [客户]
  # C 类：复杂聚合与推理
  - id: G11
    question: 每个品牌的平均能效比是多少？
    must_include: [品牌, 平均]
  - id: G12
    question: 哪个客户的项目数量最多？
    must_include: [客户]
  - id: G13
    question: 建设中的项目有多少个？
    must_include: [项目]
  - id: G14
    question: 万科和华润相比，谁的项目总面积更大？
    must_include: [万科, 华润]
  - id: G15
    question: 最近开工的 5 个项目是哪些？
    must_include: [项目]
