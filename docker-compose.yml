services:
  neo4j:
    image: neo4j:5.26-community
    container_name: kgqa-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j_password}
    volumes:
      - neo4j_data:/data

  api:
    build: .
    container_name: kgqa-api
    depends_on:
      - neo4j
    env_file:
      - .env
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      KGQA_API_BASE_URL: http://api:8000
    command: uvicorn kgqa.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  ui:
    build: .
    container_name: kgqa-ui
    depends_on:
      - api
    env_file:
      - .env
    environment:
      KGQA_API_BASE_URL: http://api:8000
    command: streamlit run ui/app.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"

volumes:
  neo4j_data:

